<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>画像圧縮検証</title>

</head>
<body>
  <div class="container">
    <h1>画像圧縮検証ツール</h1>

    <section class="controls">
      <div class="control-group">
        <label>画像を選択（複数可）</label>
        <input type="file" id="fileInput" multiple accept="image/*" />
        <p id="originalInfo" class="info"></p>
      </div>

      <div class="control-group">
        <label>圧縮ライブラリ</label>
        <div class="radio-group">
          <label>
            <input type="radio" name="library" value="browser-image-compression" checked />
            browser-image-compression
          </label>
          <label>
            <input type="radio" name="library" value="jsquash" />
            jsquash
          </label>
        </div>
      </div>

      <div class="control-group">
        <label>出力形式</label>
        <div class="radio-group">
          <label>
            <input type="radio" name="format" value="webp" checked />
            WebP
          </label>
          <label>
            <input type="radio" name="format" value="avif" />
            AVIF
          </label>
        </div>
      </div>

      <button id="compressBtn" disabled>圧縮して送信</button>
    </section>

    <section id="results" class="results" hidden>
      <h2>結果</h2>
      <table>
        <tbody>
          <tr>
            <th>圧縮前 合計サイズ</th>
            <td id="resultOriginalSize">-</td>
          </tr>
          <tr>
            <th>圧縮後 合計サイズ</th>
            <td id="resultCompressedSize">-</td>
          </tr>
          <tr>
            <th>圧縮率</th>
            <td id="resultRatio">-</td>
          </tr>
          <tr>
            <th>圧縮時間</th>
            <td id="resultCompressTime">-</td>
          </tr>
          <tr>
            <th>リクエスト〜レスポンス時間</th>
            <td id="resultRequestTime">-</td>
          </tr>
        </tbody>
      </table>
    </section>

    <div id="status" class="status"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
