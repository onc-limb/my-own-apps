name: TimeBranch

options:
  developmentLanguage: ja
  bundleIdPrefix: com.onclimb
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: YES

targets:
  TimeBranch:
    type: application
    platform: iOS
    sources:
      - TimeBranch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.onclimb.TimeBranch
        PRODUCT_NAME: TimeBranch
        MARKETING_VERSION: 1.0
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_KEY_CFBundleDisplayName: "TimeBranch"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        SWIFT_VERSION: "6.0"
    dependencies:
      - sdk: SwiftData.framework

  TimeBranchTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - TimeBranchTests
    dependencies:
      - target: TimeBranch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.onclimb.TimeBranchTests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"

  TimeBranchUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - TimeBranchUITests
    dependencies:
      - target: TimeBranch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.onclimb.TimeBranchUITests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"

schemes:
  TimeBranch:
    build:
      targets:
        TimeBranch: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - TimeBranchTests
        - TimeBranchUITests
